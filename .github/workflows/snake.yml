name: Generate contribution snake

on:
  schedule:
    - cron: '27 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake assets
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            README-assets/github-contribution-grid-snake.svg
            README-assets/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake assets
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: README-assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
