<svg width="760" height="430" viewBox="0 0 760 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub terminal stats placeholder">
  <defs>
    <linearGradient id="terminal-bg" x1="0" y1="0" x2="760" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.48" stop-color="#172554"/>
      <stop offset="1" stop-color="#064E3B"/>
    </linearGradient>
  </defs>
  <rect width="760" height="430" rx="18" fill="url(#terminal-bg)"/>
  <rect x="26" y="24" width="708" height="382" rx="14" fill="#020617" fill-opacity="0.84" stroke="#38BDF8" stroke-opacity="0.35"/>
  <circle cx="58" cy="55" r="7" fill="#F87171"/>
  <circle cx="82" cy="55" r="7" fill="#FBBF24"/>
  <circle cx="106" cy="55" r="7" fill="#34D399"/>
  <text x="42" y="96" fill="#E5E7EB" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="21" font-weight="700">shaarifalam@github</text>
  <text x="42" y="128" fill="#38BDF8" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18">──────────────────────────────</text>
  <text x="42" y="164" fill="#CBD5E1" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18">Run npm run update-stats</text>
  <text x="42" y="194" fill="#A7F3D0" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18">GitHub Actions will refresh this daily.</text>
</svg>
